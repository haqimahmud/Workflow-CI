name: CI

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install mlflow
        pip install pandas
        pip install scikit-learn
        pip install numpy

    - name: Run MLflow Project
      run: |
        mlflow run MLProject --env-manager=local